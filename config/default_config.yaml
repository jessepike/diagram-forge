version: 1
default_provider: gemini
provider_fallback_chain:
  - gemini
  - gemini_flash_31
  - openai
output_directory: ~/.diagram-forge/output
styles_directory: ~/.diagram-forge/styles
database_path: ~/.diagram-forge/usage.db

providers:
  # Gemini image generation models (all share GEMINI_API_KEY, require paid tier)
  gemini:
    enabled: true
    model: gemini-3-pro-image-preview   # Nano Banana Pro — best quality, advanced text rendering, up to 6 reference images
    api_key_env: GEMINI_API_KEY
  gemini_flash_31:
    enabled: true
    model: gemini-3.1-flash-image-preview  # Nano Banana 2 — fast, up to 14 reference images, 4K, thinking levels
    api_key_env: GEMINI_API_KEY
  gemini_flash_25:
    enabled: true
    model: gemini-2.5-flash-image          # DEPRECATED — shut down Jan 2026. Kept as fallback reference only.
    enabled: false
    api_key_env: GEMINI_API_KEY
  openai:
    enabled: true
    model: gpt-image-2-2026-04-21
    api_key_env: OPENAI_API_KEY
  openai_mini:
    enabled: false          # opt-in — ~4x cheaper than gpt-image-2, lower fidelity
    model: gpt-image-1-mini
    api_key_env: OPENAI_API_KEY
